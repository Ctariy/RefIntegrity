[build]
  command = "npm run build"
  publish = "public"

[functions]
  node_bundler = "esbuild"
  included_files = ["netlify/functions/rw-reasons.json", "netlify/functions/rw-timestamp.txt"]

# 301 redirect from old Netlify subdomain to custom domain
[[redirects]]
  from = "https://refintegrity.netlify.app/*"
  to = "https://refintegrity.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# i18n: language pages are pre-rendered at build time (scripts/build-i18n-pages.mjs)
# No rewrite rules needed — each /xx/ has its own index.html

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    X-XSS-Protection = "1; mode=block"
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://gc.zgo.at; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[dev]
  port = 8888
  publish = "public"
  functions = "netlify/functions"
